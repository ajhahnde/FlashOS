# Flash toolchain pin
#
# The flashc revision this tree is transpiled with. Flash modules
# (`*.flash`) are rebuilt through this exact compiler; port progress
# must never depend on a moving toolchain. Bumping the pin is a
# deliberate, single-commit step (rebuild + both boot watchdogs green).
#
# The build resolves the binary via -Dflashc=<path>; the default
# expects a Flash checkout at ~/Flash built with `zig build` — since Flash v1.0.1 the installed `flashc` IS the live self-hosted
# compiler (native LLVM driver; Zig emission needs the explicit `--backend=zig`).

flash-version = 1.2.0
flash-commit  = 44ad751b227f81b7e1202cade4024aa3adb95f74
flashc-binary = zig-out/bin/flashc
