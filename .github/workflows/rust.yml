# Production CI: Rust workspace gates plus the complete rpi4b boot contract.
# The native build invokes Cargo, clang, and the LLVM tools installed with the
# pinned Rust toolchain; neither Zig nor the Flash compiler is installed.
name: rust

on:
  push:
    branches: [main, "v*"]
  pull_request:
  workflow_dispatch:

jobs:
  rust:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - name: centralized version manifest
        run: |
          scripts/sync_versions.sh --check
          . ./versions.env
          printf 'FLASHOS_QEMU_VERSION=%s\n' "$FLASHOS_QEMU_VERSION" >> "$GITHUB_ENV"

      # rustup honours rust-toolchain.toml, so the pinned release, the
      # aarch64-unknown-none-softfloat target, and llvm-tools install from that
      # one file. rust-lld, llvm-objcopy, llvm-nm and llvm-objdump come with it.
      - name: install the pinned Rust toolchain
        run: |
          rustup show active-toolchain || rustup toolchain install
          rustc --version
          rustc --print target-spec-json -Z unstable-options \
            --target aarch64-unknown-none-softfloat 2>/dev/null | grep -E '"features"|"abi"' || true

      # clang assembles the retained .S files. It is the only compiler outside
      # the Rust toolchain used by the production build.
      - name: assembler
        run: clang --version

      - name: cargo fmt
        run: cargo fmt --all --check

      - name: cargo clippy
        run: >-
          cargo clippy --workspace --exclude flashos-canary
          --exclude flashos-klib --all-targets -- -D warnings

      - name: rust host tests
        run: >-
          cargo test --workspace --exclude flashos-canary
          --exclude flashos-klib

      - name: hygiene gate
        run: cargo xtask check-hygiene

      - name: public documentation drift
        run: scripts/check_doc_drift.sh

      # Every shipped payload, not a sample. Each link also checks for undefined
      # symbols, core::fmt, FP/SIMD instructions, and duplicate mem providers.
      - name: EL0 payload link + artefact checks
        run: |
          for payload in hello clear echo cat ls rm cp mv grep meminfo dmesg \
                         uptime cpuinfo forkbomb argv_echo flibc_demo stackbomb; do
            cargo xtask user "$payload"
          done

      # The .S files read three layout facts (exception-frame size, syscall
      # dispatch cap, core_context offset) from a generated include. Prove the
      # include is still wired in and nobody re-added a hand-written copy.
      - name: assembly layout facts
        run: cargo xtask asm-defs --check

      - name: armstub link
        run: cargo xtask armstub

      - name: retired-language source census
        run: cargo xtask census

      # Build the production artefact under rejecting PATH shims and inspect the
      # complete subprocess trace for retired compiler invocations.
      - name: clean-room guard (full rpi4b production build)
        run: cargo xtask guard --board rpi4b --full

      # mtools builds the FAT32 test disk. Hosted runners do not provide the
      # contract-pinned QEMU release, so build it once and cache it by version.
      - name: install mtools + qemu build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y mtools ninja-build pkg-config python3-pip \
            python3-venv libglib2.0-dev libpixman-1-dev flex bison

      - name: cache qemu-system-aarch64 (pinned source build)
        id: qemu
        uses: actions/cache@v4
        with:
          path: ~/qemu-prefix
          key: qemu-aarch64-${{ env.FLASHOS_QEMU_VERSION }}-${{ runner.os }}

      - name: build qemu-system-aarch64 from pinned source
        if: steps.qemu.outputs.cache-hit != 'true'
        run: |
          ver="$FLASHOS_QEMU_VERSION"
          curl -fsSL -o /tmp/qemu.tar.xz "https://download.qemu.org/qemu-$ver.tar.xz"
          mkdir -p /tmp/qemu-src
          tar -xJf /tmp/qemu.tar.xz -C /tmp/qemu-src --strip-components=1
          cd /tmp/qemu-src
          ./configure --prefix="$HOME/qemu-prefix" --target-list=aarch64-softmmu \
            --disable-docs --disable-tools --disable-gtk --disable-sdl \
            --disable-vnc --disable-curses --disable-werror
          make -j"$(nproc)"
          make install

      - name: put pinned qemu on PATH
        run: |
          echo "$HOME/qemu-prefix/bin" >> "$GITHUB_PATH"
          "$HOME/qemu-prefix/bin/qemu-system-aarch64" --version
          "$HOME/qemu-prefix/bin/qemu-system-aarch64" -machine help | grep -i raspi4b

      - name: rpi4b production watchdog
        # Both flags are mandatory: one runs the in-kernel scenarios, the other
        # authenticates the unattended login so the third shell marker appears.
        run: |
          cargo xtask build --board rpi4b --ci-login-seed --boot-selftest
          sh scripts/make_test_disk.sh \
            rust-out/initramfs-stage/etc/shadow rootfs/etc/perms.tab
          scripts/run_qemu_test.sh 720 qemu-system-aarch64 \
            -M raspi4b -display none -serial null -serial stdio \
            -kernel rust-out/rpi4b/kernel8.img \
            -drive if=sd,file=rust-out/test_sd.img,format=raw
