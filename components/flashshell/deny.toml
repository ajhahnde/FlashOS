# cargo-deny policy for the FlashShell nested workspace.
#
# FlashShell is excluded from the root cargo workspace (edition 2024,
# resolver 3, its own pinned toolchain), so the root deny.toml never sees this
# lockfile. Today the dependency surface is empty — every crate here is an
# intra-workspace path dependency — and this policy exists so the FIRST
# external crate that lands is audited by CI instead of arriving unreviewed.

[advisories]
version = 2
# No ignores — an entry here must carry a comment justifying the exception.
ignore = []

[licenses]
version = 2
confidence-threshold = 0.9
# FlashShell itself ships Apache-2.0; keep the allowance to the permissive
# pair until a dependency forces a reviewed widening.
allow = [
    "Apache-2.0",
    "MIT",
]

[bans]
# A duplicate version flags supply-chain bloat for review without blocking a
# legitimate transitive diamond.
multiple-versions = "warn"
wildcards = "warn"

[sources]
# Crates may come only from crates.io. Adding a git or private-registry source
# is a supply-chain decision that must be made explicitly here.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
